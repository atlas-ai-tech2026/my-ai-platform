<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/voxel-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VOXEL.AI — AI-Powered Creative Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Belt-and-suspenders: if any stale service worker from an earlier build
         is still registered, unregister it so it stops serving cached assets.
         (The kill-switch /sw.js handles tabs the SW currently controls.) -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then((regs) => regs.forEach((r) => r.unregister()))
          .catch(() => {});
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
