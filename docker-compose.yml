# Local reproduction of the production stack.
#   docker compose up --build
# Web  → http://localhost:8080
# API  → http://localhost:3001  (also reachable via web at /api/*)
#
# Both containers internally listen on 8080 (matching DO App Platform).
# We map the host port 3001 → container 8080 for the api so the local
# CLAUDE.md docs (and the Vite dev proxy) keep pointing at :3001.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: voxel-api
    restart: unless-stopped
    env_file:
      # Load FAL_KEY and other secrets from server/.env.
      # Without this, the container starts with an empty FAL_KEY and every
      # /api/generate call fails. Keep this line — do not rely on the shell env.
      - ./server/.env
    environment:
      NODE_ENV: production
      # Container listens on 8080 (matches DO App Platform); host maps
      # localhost:3001 → container:8080 below so the Vite dev proxy and the
      # CLAUDE.md docs keep pointing at :3001 unchanged.
      PORT: 8080
      # FAL_KEY is loaded via env_file above — do not duplicate here.
    ports:
      - "3001:8080"
    volumes:
      # Persist entities.json across container rebuilds
      - voxel-data:/app/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: voxel-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  voxel-data:
