server {
  # DO App Platform expects 8080; locally docker-compose maps host‚Üícontainer 8080
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip static assets
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1024;

  # Reverse-proxy API calls to the backend container (Vite dev proxy is gone in prod)
  location /api/ {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Image/video generation can take a while
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    client_max_body_size 25m;
  }

  # SPA fallback ‚Äî every non-asset route returns index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long cache for hashed assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
