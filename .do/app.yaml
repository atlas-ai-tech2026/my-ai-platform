name: voxel-ai
region: nyc

# ─── Custom domain ──────────────────────────────────────────────────
# Connects voxel-ai.ai (and www) to this app. DO provisions a free
# Let's Encrypt HTTPS cert automatically ONCE DNS points here.
#
# IMPORTANT — this block alone does NOT make the site load. You must also
# point the domain at DigitalOcean at your registrar (where voxel-ai.ai was
# bought). Easiest: set the domain's nameservers to
#   ns1.digitalocean.com  ns2.digitalocean.com  ns3.digitalocean.com
# DNS can take 30 min–24 h to propagate. Until then Chrome shows
# "server not found" because the name doesn't resolve yet.
domains:
  - domain: voxel-ai.ai
    type: PRIMARY
  - domain: www.voxel-ai.ai
    type: ALIAS

# Single-service Node buildpack deploy.
# Express serves the built Vite frontend (dist/) AND the /api/* routes from
# one process on $PORT (8080). Procfile defines the start command.
#
# DO's Node buildpack runs `npm ci && npm run build` automatically when it
# detects a build script in package.json, but we set build_command
# explicitly so the server's deps are installed too.
#
# Replaced an earlier two-service Dockerfile-based spec (api + web behind
# nginx). Switched to single-service buildpack because (a) DO was ignoring
# the dockerfile_path and falling back to buildpack anyway, (b) one process
# is simpler to debug, (c) this also fixes the 'vite: not found' build
# failure caused by NODE_ENV=production at build time skipping devDeps —
# build tools now live in `dependencies` and NODE_ENV is RUN_TIME-only.

services:
  - name: web
    github:
      repo: atlas-ai-tech2026/my-ai-platform
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    build_command: npm ci && npm run build && npm --prefix server ci --omit=dev
    run_command: node server/src/index.js
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 6
    envs:
      # NODE_ENV must NOT be set at BUILD_TIME — npm ci skips devDependencies
      # when it sees NODE_ENV=production, which would break the Vite build.
      # Set it only at RUN_TIME so Express still runs in production mode.
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      # Belt-and-suspenders: explicitly tell npm to install ALL deps at build,
      # in case any other env var or buildpack default flips NODE_ENV on us.
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
        scope: BUILD_TIME
      - key: PORT
        value: "8080"
        scope: RUN_TIME

# Secrets (FAL_KEY, JWT_SECRET, DATABASE_URL) are intentionally NOT declared
# in this spec. Why: when a key is declared here as `type: SECRET` with no
# value, it creates a component-level "slot" that can shadow an app-level
# value with the same key. We hit exactly this — FAL_KEY appeared set in the
# DO dashboard but the runtime container saw it empty.
#
# Manage these in DO Dashboard → your app → Settings → App-Level
# Environment Variables. Add each one:
#
#   FAL_KEY        (Encrypted)  scope=Run Time
#   JWT_SECRET     (Encrypted)  scope=Run Time
#   DATABASE_URL   (Plain or Encrypted) scope=Run Time
#                  Tip: set value to ${voxel-db.DATABASE_URL} so DO injects
#                  the connection string from the attached database
#                  automatically and rotates it if you re-attach.
